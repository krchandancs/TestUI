<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A3C7D"/>
      <stop offset="60%"  stop-color="#1E6FD8"/>
      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <linearGradient id="swooshGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A3C7D"/>
      <stop offset="100%" stop-color="#1E6FD8"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <!-- Centered text: ForMedrix (regular weight) + AI (heavy weight, same size, same baseline) -->
  <!-- Motion streaks left of "A" — gives AI a dynamic forward-moving feel -->
  <!-- These are positioned relative to where "AI" starts (~x=228 based on centered text) -->
  <line x1="218" y1="30" x2="228" y2="30" stroke="#5AC8FA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="214" y1="40" x2="228" y2="40" stroke="#5AC8FA" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="216" y1="50" x2="228" y2="50" stroke="#5AC8FA" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <text x="150" y="52"
        text-anchor="middle"
        font-family="Segoe UI, Roboto, Arial, sans-serif"
        font-size="42"
        font-style="italic">
    <tspan font-weight="600" fill="url(#textGradient)">ForMedrix</tspan><tspan font-weight="900" fill="#5AC8FA" dx="4" font-style="normal">AI</tspan>
  </text>

  <!-- Swooshes — end before AI, shortened to avoid overlap -->
  <path d="M34,66 C90,56 155,54 212,60 C155,58 90,64 34,74 Z"
        fill="url(#swooshGradient)" opacity="0.90"/>
  <path d="M38,79 C92,72 153,71 206,77 C153,75 92,80 38,86 Z"
        fill="url(#swooshGradient)" opacity="0.55"/>

</svg>
