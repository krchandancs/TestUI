<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <!-- Define gradient for modern look -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E7490;stop-opacity:1" />
    </linearGradient>
  </defs>
 
  <!-- Main hexagon shape (smaller for horizontal layout) -->
  <polygon
    points="100,30 165,65 165,135 100,170 35,135 35,65"
    fill="url(#hexGradient)"
    stroke="#0E7490"
    stroke-width="3"
  />
 
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="42" fill="#FFFFFF" stroke="#0E7490" stroke-width="3"/>
 
  <!-- Center icon: Document -->
  <rect x="78" y="80" width="44" height="40" rx="2.5" fill="none" stroke="#0891B2" stroke-width="2.5"/>
 
  <!-- Document lines -->
  <line x1="84" y1="88" x2="116" y2="88" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="96" x2="116" y2="96" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="104" x2="102" y2="104" stroke="#0891B2" stroke-width="2" stroke-linecap="round"/>
 
  <!-- Checkmark -->
  <polyline
    points="84,111 91,116 116,94"
    fill="none"
    stroke="#10B981"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
 
  <!-- Text: PathScribe -->
  <text
    x="200"
    y="125"
    font-family="'Inter', 'Segoe UI', Roboto, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#1E293B"
    text-anchor="start"
  >
    PathScribe<tspan
      font-size="36"
      fill="#0891B2"
      dy="-22"
      dx="6"
    >AI</tspan>
  </text>
</svg>