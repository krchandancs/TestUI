<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E7490;stop-opacity:1" />
    </linearGradient>
  </defs>
 
  <!-- Main hexagon shape -->
  <polygon
    points="160,20 275,85 275,215 160,280 45,215 45,85"
    fill="url(#hexGradient)"
    stroke="#0E7490"
    stroke-width="4"
  />
 
  <!-- Inner circle -->
  <circle cx="160" cy="150" r="65" fill="#FFFFFF" stroke="#0E7490" stroke-width="4"/>
 
  <!-- Center icon: Document -->
  <rect x="130" y="120" width="60" height="60" rx="4" fill="none" stroke="#0891B2" stroke-width="4"/>
 
  <!-- Document lines -->
  <line x1="138" y1="132" x2="182" y2="132" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="145" x2="182" y2="145" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="158" x2="165" y2="158" stroke="#0891B2" stroke-width="3" stroke-linecap="round"/>
 
  <!-- Checkmark -->
  <polyline
    points="138,168 148,176 182,145"
    fill="none"
    stroke="#10B981"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>